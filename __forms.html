<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Netlify Forms</title>
  <meta name="robots" content="noindex, nofollow">
</head>
<body>
  <!-- Netlify Forms decoy — registers form definitions at build time -->
  <form name="quote" netlify netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="quote">
    <input name="bot-field">
    <input name="name">
    <input name="business_name">
    <input name="email" type="email">
    <input name="phone" type="tel">
    <input name="state">
    <input name="years_owning">
    <input name="num_lots">
    <input name="park_type">
    <input name="annual_rents">
    <input name="park_owned_homes">
    <textarea name="message"></textarea>
    <button type="submit">Submit</button>
  </form>
</body>
</html>
